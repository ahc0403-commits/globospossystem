name: globos_pos_system
description: GLOBOS POS System - Flutter Native F&B POS
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.16.0

  # State Management
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Routing
  go_router: ^15.1.1

  # Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Local Cache (read-only, 메뉴 조회 한정)
  drift: ^2.34.2
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.6
  path: ^1.9.1

  # Printer (blue_thermal_printer은 Android/iOS 전용 - 하드웨어 연동 시 추가)
  esc_pos_utils_plus: ^2.0.4

  # Utils
  intl: ^0.20.2
  uuid: ^4.6.0
  flutter_dotenv: ^6.0.1
  shared_preferences: ^2.3.2
  zkfinger10:
    git:
      url: https://github.com/Mamasodikov/zk_finger_10.git
  timezone: ^0.11.1
  camera: ^0.12.0+2
  image: ^4.1.7
  excel: ^4.0.6
  file_selector: ^1.1.0
  file_saver: ^0.4.0
  image_picker: ^1.2.3
  crypto: ^3.0.3
  fl_chart: ^0.68.0
  url_launcher: ^6.3.1
  pdf: ^3.12.0
  printing: ^5.14.3
  qr_flutter: ^4.1.0
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.15.1
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
  drift_dev: ^2.34.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/fonts/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/PretendardVariable.ttf
