name: Photo Objet Sales Health

on:
  schedule:
    # Check after the 22:20 HCM collection and its 90-minute grace period.
    - cron: '40 17 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: photo-objet-slot-health
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: scripts/package-lock.json
      - name: Install locked audit dependencies
        working-directory: scripts
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
        run: npm ci
      - name: Refresh typed expected-slot health
        id: detect
        working-directory: scripts
        run: |
          node photo_objet_slot_health.js --refresh --output health-evidence.json
          count=$(node -e "const e=require('./health-evidence.json'); console.log(e.newly_alertable.length)")
          echo "alert_count=${count}" >> "${GITHUB_OUTPUT}"
      - name: Deliver deduplicated slot alerts
        id: deliver
        if: steps.detect.outcome == 'success' && steps.detect.outputs.alert_count != '0'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const evidence = JSON.parse(fs.readFileSync('scripts/health-evidence.json', 'utf8'));
            const open = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
            });
            for (const alert of evidence.newly_alertable) {
              const slotTime = String(alert.slot_time_hcm).slice(0, 5);
              const marker = `${alert.store_id}/${alert.slot_date_hcm}/${slotTime}/${alert.failure_class}`;
              const title = `[Photo Objet health] ${marker}`;
              const body = [
                `Failure class: ${alert.failure_class}`,
                `Store: ${alert.store_id}`,
                `Slot: ${alert.slot_date_hcm} ${slotTime} HCM`,
                `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n');
              const existing = open.find(issue => !issue.pull_request && issue.title === title);
              if (existing) await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
              else await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body,
              });
            }
      - name: Acknowledge delivered alerts
        if: steps.detect.outcome == 'success' && steps.detect.outputs.alert_count != '0' && steps.deliver.outcome == 'success'
        working-directory: scripts
        run: node photo_objet_slot_health.js --ack-file health-evidence.json
      - name: Escalate detected audit infrastructure failure
        if: always() && steps.detect.outcome == 'success'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const evidence = JSON.parse(fs.readFileSync('scripts/health-evidence.json', 'utf8'));
            if (evidence.audit_result !== 'ERROR') return;
            const title = '[Photo Objet health] AUDIT_INFRA_FAILED';
            const body = [
              `Infrastructure store-days: ${evidence.infrastructure_failure_store_days}`,
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);
            if (existing) await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: existing.number, body,
            });
            else await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo, title, body,
            });
      - name: Enforce current scheduler health independently of alert dedupe
        if: always() && steps.detect.outcome == 'success'
        working-directory: scripts
        run: node photo_objet_slot_health.js --assert-file health-evidence.json
      - name: Escalate audit infrastructure failure
        if: failure() && steps.detect.outcome != 'success'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const title = '[Photo Objet health] AUDIT_INFRA_FAILED';
            const body = `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100,
            });
            const existing = issues.find(issue => !issue.pull_request && issue.title === title);
            if (existing) await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: existing.number, body,
            });
            else await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo, title, body,
            });
